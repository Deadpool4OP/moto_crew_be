components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatar:
          type: string
        vehicleType:
          type: string
          enum: [bike, car, scooter, other]
        role:
          type: string
          enum: [user, admin]
        isEmailVerified:
          type: boolean
    
    AuthTokens:
      type: object
      properties:
        access:
          $ref: '#/components/schemas/Token'
        refresh:
          $ref: '#/components/schemas/Token'
          
    Token:
      type: object
      properties:
        token:
          type: string
        expires:
          type: string
          format: date-time

    Room:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        host:
          type: string
        riders:
          type: array
          items:
            type: string
        maxRiders:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Location:
      type: object
      properties:
        userId:
          type: string
        roomId:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        speed:
          type: number
        heading:
          type: number
        timestamp:
          type: string
          format: date-time

    SOS:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        roomId:
          type: string
        status:
          type: string
          enum: [active, resolved, cancelled]
        message:
          type: string
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
        createdAt:
          type: string
          format: date-time
